<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ad Notification Spam</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px;
            background-color: #f0f0f0;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        button {
            padding: 15px 30px;
            font-size: 18px;
            cursor: pointer;
            background-color: #ff4444;
            color: white;
            border: none;
            border-radius: 5px;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #cc0000;
        }
        .text-popup {
            position: fixed;
            background-color: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            max-width: 300px;
            font-size: 14px;
            opacity: 0;
            transition: opacity 0.5s ease-in-out;
            pointer-events: none;
            text-align: left;
        }
        .image-popup {
            position: fixed;
            width: 200px;
            height: 200px;
            background-size: cover;
            background-position: center;
            border: 2px solid #ff4444;
            border-radius: 5px;
            opacity: 0;
            transition: opacity 0.5s ease-in-out;
            pointer-events: auto;
            cursor: pointer;
            display: block;
        }
        .text-popup.show, .image-popup.show {
            opacity: 1;
        }
    </style>
</head>
<body>
    <button onclick="triggerAdSpam()">Allow Notifications</button>

    <script>
        // Array of ad messages, including NSFW-themed ones
        const adMessages = [
            { title: "Tech Deals!", body: "Grab the latest smartphones at 40% off at TechTrendz!" },
            { title: "Fashion Frenzy!", body: "Exclusive clothing deals at StyleVibe!" },
            { title: "Hot NSFW Content!", body: "Join our adult platform for exclusive spicy videos!" },
            { title: "Car Bargains!", body: "Drive away with 0% financing at AutoZone!" },
            { title: "NSFW VIP Access!", body: "Unlock premium adult entertainment at NaughtyHub!" },
            { title: "Eco Products!", body: "Shop sustainable goods at GreenMart!" },
            { title: "Adult Fun Awaits!", body: "Explore NSFW content with a $5 trial at SpicyZone!" },
            { title: "Gadget Mania!", body: "Best prices on electronics at ElectroShop!" },
            { title: "Steamy Deals!", body: "NSFW subscriptions starting at $9.99/month!" },
            { title: "Fitness Gear!", body: "Get fit with 20% off at ActiveLife!" }
        ];

        // Array of placeholder NSFW image URLs
        const nsfwImages = [
            'https://via.placeholder.com/200x200.png?text=NSFW+Image+1',
            'https://via.placeholder.com/200x200.png?text=NSFW+Image+2',
            'https://via.placeholder.com/200x200.png?text=NSFW+Image+3',
            'https://via.placeholder.com/200x200.png?text=NSFW+Image+4',
            'https://via.placeholder.com/200x200.png?text=NSFW+Image+5'
        ];

        // Placeholder NSFW site URL
        const nsfwSiteUrl = 'https://example.com';

        async function triggerAdSpam() {
            // Request notification permission
            const permission = await Notification.requestPermission();
            if (permission !== 'granted') {
                alert('You need to allow notifications to see the ads!');
                return;
            }

            // Start continuous spamming
            spamAds();
            setInterval(spamAds, 10000); // Repeat every 10 seconds
        }

        async function spamAds() {
            // Spam 100 browser notifications
            for (let i = 0; i < 100; i++) {
                const ad = adMessages[Math.floor(Math.random() * adMessages.length)];
                new Notification(ad.title, {
                    body: ad.body,
                    icon: 'https://via.placeholder.com/64'
                });
                await new Promise(resolve => setTimeout(resolve, 100));
            }

            // Spam 100 text pop-ups
            for (let i = 0; i < 100; i++) {
                const ad = adMessages[Math.floor(Math.random() * adMessages.length)];
                createTextPopup(ad.title, ad.body);
                await new Promise(resolve => setTimeout(resolve, 100));
            }

            // Spam 100 image pop-ups
            for (let i = 0; i < 100; i++) {
                const imageUrl = nsfwImages[Math.floor(Math.random() * nsfwImages.length)];
                createImagePopup(imageUrl);
                await new Promise(resolve => setTimeout(resolve, 100));
            }
        }

        function createTextPopup(title, body) {
            const popup = document.createElement('div');
            popup.className = 'text-popup';
            popup.innerHTML = `<strong>${title}</strong><br>${body}`;
            const maxX = window.innerWidth - 300;
            const maxY = window.innerHeight - 100;
            popup.style.left = `${Math.random() * maxX}px`;
            popup.style.top = `${Math.random() * maxY}px`;
            document.body.appendChild(popup);
            setTimeout(() => {
                popup.classList.add('show');
            }, 10);
            setTimeout(() => {
                popup.style.opacity = '0';
                setTimeout(() => popup.remove(), 500);
            }, 3000);
        }

        function createImagePopup(imageUrl) {
            const popup = document.createElement('a');
            popup.className = 'image-popup';
            popup.href = nsfwSiteUrl;
            popup.target = '_blank';
            popup.style.backgroundImage = `url(${imageUrl})`;
            const maxX = window.innerWidth - 200;
            const maxY = window.innerHeight - 200;
            popup.style.left = `${Math.random() * maxX}px`;
            popup.style.top = `${Math.random() * maxY}px`;
            document.body.appendChild(popup);
            setTimeout(() => {
                popup.classList.add('show');
            }, 10);
            setTimeout(() => {
                popup.style.opacity = '0';
                setTimeout(() => popup.remove(), 500);
            }, 3000);
        }
    </script>
</body>
</html>
